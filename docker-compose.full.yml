version: '3.8'

services:
  cyberbro-web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - mongodb
      - redis
    environment:
      MYSQL_HOST: mysql
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
    volumes:
      - ./data:/app/data

  mysql:
    image: mysql:8.0
    container_name: cyberbro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cyberbro
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:6.0
    container_name: cyberbro-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: cyberbro-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  mongo_data:
